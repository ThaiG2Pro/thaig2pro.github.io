baseURL = 'https://thaig2pro.github.io/'
title = 'Blog của Tôi'
theme = 'PaperMod'

# Multilingual configuration
defaultContentLanguage = 'vi'

[languages.vi]
    languageName = 'Tiếng Việt'
    contentDir = 'content'
    weight = 1
    title = 'Blog của Tôi'
    [languages.vi.params]
        description = 'Chia sẻ kiến thức lập trình và cuộc sống.'
        [languages.vi.params.homeInfoParams]
            Title = "Chào mừng 👋"
            Content = "Blog hướng dẫn Hugo, PaperMod và công nghệ."

[languages.en]
    languageName = 'English'
    contentDir = 'content'
    weight = 2
    title = 'My Blog'
    [languages.en.params]
        description = 'Sharing coding knowledge and life experiences.'
        [languages.en.params.homeInfoParams]
            Title = "Welcome 👋"
            Content = "A blog about Hugo, PaperMod, and tech."

[markup]
  [markup.highlight]
    noClasses = false  # CRITICAL: Use classes instead of inline styles
    codeFences = true
    guessSyntax = true
    style = "monokai"  # Base, but will be overridden

[params]
    author = "Hoang Nguyen Thai"
    defaultTheme = "auto"
    showCodeCopyButtons = true
    displayFullContent = false
    ShowReadingTime = true
    ShowShareButtons = true
    ShowBreadCrumbs = true
    ShowToc = true

    # Social icons for home page
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/thaig2pro"
    
    [[params.socialIcons]]
        name = "facebook"
        url = "https://facebook.com/your-profile"
    
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://linkedin.com/in/your-profile"
