baseURL = 'https://thaig2pro.github.io/'
title = 'Blog của Tôi'
theme = 'PaperMod'

# Multilingual configuration
defaultContentLanguage = 'vi'

[outputs]
    home = ["HTML", "RSS", "JSON"]

[languages.vi]
    languageName = 'Tiếng Việt'
    contentDir = 'content'
    weight = 1
    title = 'Blog của Tôi'
    [languages.vi.params]
        description = 'Chia sẻ kiến thức lập trình và cuộc sống.'
        [languages.vi.params.homeInfoParams]
            Title = "Chào bạn, mình là Thái 🚀"
            Content = "Nơi mình chia sẻ về Hugo, PaperMod và những hành trình công nghệ."
    # Vietnamese Menu
    [[languages.vi.menu.main]]
        identifier = "posts"
        name = "Bài viết"
        url = "/posts/"
        weight = 10
    [[languages.vi.menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 20
    [[languages.vi.menu.main]]
        identifier = "search"
        name = "Tìm kiếm"
        url = "/search/"
        weight = 30

[languages.en]
    languageName = 'English'
    contentDir = 'content'
    weight = 2
    title = 'My Blog'
    [languages.en.params]
        description = 'Sharing coding knowledge and life experiences.'
        [languages.en.params.homeInfoParams]
            Title = "Hey, I'm Thai 🚀"
            Content = "A place where I share my journey with Hugo, PaperMod, and tech stories."
    # English Menu
    [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts/"
        weight = 10
    [[languages.en.menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 20
    [[languages.en.menu.main]]
        identifier = "search"
        name = "Search"
        url = "/en/search/" # Point to English search page
        weight = 30

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    style = "monokai"

[params]
    author = "Hoang Nguyen Thai"
    defaultTheme = "auto"
    showCodeCopyButtons = true
    displayFullContent = false
    ShowReadingTime = true
    ShowShareButtons = true
    ShowBreadCrumbs = true
    ShowToc = true

    # Social icons for home page
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/thaig2pro"
    [[params.socialIcons]]
        name = "facebook"
        url = "https://www.facebook.com/thailovedata"
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/in/thai-love-data/"
